[terraform]
disabled = true
symbol = "ůįÜß" # cube for opentofu <3; terraform icon:  ÓĘĹ
style = "bg:bg4 fg:3"
format = '[ $symbol ($version )($workspace )]($style)' # if it's slow remove $version (check docs) (terraform)

[docker_context]
disabled = true
