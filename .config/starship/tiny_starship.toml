add_newline = true

## Yorumi Owl Theme

palette = "Yorumi_Owl"

[palettes.Yorumi_Owl]
bg1 = "#152f4c"
bg2 = "#223f5a"
bg3 = "#2f4e69"
bg4 = "#3b5d77"
bg5 = "#486d85"
bg6 = "#557c93"
dark_red = "#d32f2f"
dark_green = "#5faf00"
alt_white = "#f8f8ff"

##########################
## Transient Workaround ##
##########################

[profiles]
transient="""
$character\
"""

rtransient="""
"""

##############
## Standard ##
##############

[character]
success_symbol = "[‚ĚĮ](bold dark_green)"
error_symbol = "[‚ĚĮ](bold dark_red)"

[fill]
symbol = ' '

[username]
disabled = true
show_always = true
style_user = "bg:bg1 blue"
style_root = "bg:bg1 blue"
format = '[ ÔĆÉ ]($style)'

[directory]
disabled = true
style = "bg:bg1 bold 4"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "Óįõ "
"Pictures" = "ÔÄĺ "

[time]
disabled = true
time_format = "%T"
style = "bg:bg1"
format = '[ ÔÄó $time ]($style)'

[cmd_duration]
disabled = true
min_time = 500
min_time_to_notify = 30000
style = 'bg:bg1 fg:14'
format = '[ $duration ÔČí ]($style)'

[status]
disabled = true
success_symbol = "‚úĒ"
symbol = "‚úė"
style = "bg:bg2 red"
success_style = "bg:bg2 dark_green"
format = "[ $status $symbol ]($style)"

#########
## VSC ##
#########

[git_branch]
symbol = "Ôáď"
style = "bg:bg1"
format = '[[ $symbol $branch](bg:bg1 bold 6) ]($style)'

[git_state]
style = "bg:bg2"
rebase = "[Óúß rebase](bg:bg2 fg:11)"
merge = "[Óúß merge](bg:bg2 fg:10)"
cherry_pick = "[Óäõ pick](bg:bg2 fg:13)"
revert = "[ůįēć revert](bg:bg2 fg:9)"
bisect = "[Óęė bisect](bg:bg2 fg:14)"
format = '[$state($progress_current/$progress_total) ]($style)'

[git_status]
style = "bg:bg1"
conflicted = "[!${count}](bg:bg1 fg:9) "
staged = "[+${count}](bg:bg1 fg:10) "
modified = "[*${count}](bg:bg1 fg:11) "
untracked = "[?${count}](bg:bg1 fg:12) "
deleted = "[ÔĎß${count}](bg:bg1 fg:9) "
stashed = "[ÔÜá${count}](bg:bg1 fg:6) "
format = '''[${conflicted}${staged}${modified}${deleted}${untracked}]($style)'''
ahead = "[Ó™°${count}](bg:bg1 fg:dark_green) "
behind = "[Ó™ö${count}](bg:bg1 fg:dark_green) "
diverged = "[Ó™°${ahead_count}](bg:bg1 fg:dark_green) [Ó™ö${behind_count}](bg:bg1 fg:red) "

############
## DevOps ##
############

[kubernetes]
disabled = true
symbol = "‚ėł"
style = "bg:bg4 fg:alt_white"
format = "[ $symbol $context( ($namespace)) ]($style)"

[helm]
disabled = true
symbol = "ÓüĽ"
style = "bg:bg5 fg:12"
